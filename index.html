<html>
  <head>
    <title>Potato Bot</title>
    <style>
      body {
        background-color: #81c784;
        font-family: monospace;
        margin: 3em;
        text-align: center;
      }
      
      .🥔 {
        display: block;
        width: 1em;
        height: 1em;
        margin: 0 auto 1em;
        font-size: 10em;
        animation-name: spin;
        animation-duration: 40000ms;
        animation-iteration-count: infinite;
        animation-timing-function: linear;
      }
      
      @keyframes spin {
        from {transform:rotate(0deg);}
        to {transform:rotate(360deg);}
      }
      
      h1, p, a {
        width: max-content;
        margin: 1em auto;
        background-color: white;
        box-shadow: 0.2em 0.2em teal;
        padding: 0.2em;
      }
      
      a {
        transition: all 0.2s ease-out;
      }
      
      a:hover {
        background-color: teal;
        color: white;
        box-shadow: 0em 0em teal;
      }
    </style>
  </head>
  <body>
    <div class="🥔">🥔</div>
    <h1>Potato Bot</h1>
    <p>Hours of potato-based fun for your Discord server.</p>
    <a href="https://discord.com/oauth2/authorize?client_id=511550439163035678&scope=bot&permissions=0">👉 Invite Potato bot into your home 👈</a>
  </body>
</html>
